name: EvalForge CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Backend unit tests ─────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          # Named file so all SQLAlchemy connections share the same SQLite DB.
          # ":memory:" would create a separate empty DB per connection, breaking
          # the create_all / drop_all fixture pattern.
          DATABASE_URL: "sqlite:///./test_ci.db"
          OLLAMA_BASE_URL: "http://localhost:11434"
        run: |
          pytest \
            --tb=short \
            -q \
            --json-report \
            --json-report-file=pytest-report.json

      - name: Upload pytest JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-report
          path: backend/pytest-report.json

  # ── Job 2: Frontend lint + build ──────────────────────────────────────────
  frontend-ci:
    name: Frontend CI (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (TypeScript check + static generation)
        run: npm run build

  # ── Job 3: Regression gate ────────────────────────────────────────────────
  regression-gate:
    name: Regression Gate
    needs: [backend-tests, frontend-ci]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download pytest report
        uses: actions/download-artifact@v4
        with:
          name: pytest-report
          path: .

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run regression gate
        run: python scripts/check_regression.py pytest-report.json
